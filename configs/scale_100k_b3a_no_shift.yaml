experiment_name: scale_100k_b3a_no_shift_seed42
seed: 42
device: cuda
output_dir: results/experiments
# B3a: disable 2θ shift augment; keep B4 strict selection + baseline loss.
best_metric: strict_raw_top1_elementwise_rate
eval_ltol: 0.3
eval_atol_deg: 10.0
strict_ltol: 0.05
strict_atol_deg: 3.0
data:
  train_lmdb: /nanolab/users/wyx/alex_aflow_oqmd_mp/datasets/pxrd_241113_train.lmdb
  valid_lmdb: /nanolab/users/wyx/alex_aflow_oqmd_mp/datasets/pxrd_241113_valid.lmdb
  train_jsonl: data/processed/train100k_seed42.jsonl
  valid_jsonl: data/processed/valid1400_seed42.jsonl
  lattice_stats: data/processed/lattice_matrix6_stats_100k_seed42.json
  representation: matrix6
  batch_size: 64
  num_workers: 4
  train_augment: true
  valid_augment: false
  augment_shift_range: 0.0
model:
  encoder_checkpoint: /nanolab/users/wyx/archive/RealPXRD-Solver/pretrained/weight/2501/pxrd-all/last_one.ckpt
  freeze_encoder: false
  normalize_embedding: true
  hidden_dim: 256
  dropout: 0.1
  position_encoding: discrete
  warm_start_checkpoint: results/experiments/scale_100k_b4_strict_select_seed42/checkpoints/best.pt
optim:
  head_lr: 0.001
  encoder_lr: 0.0001
  weight_decay: 0.01
  warmup_epochs: 0.5
  max_epochs: 8
  grad_clip: 1.0
  early_stop_patience: 3
loss:
  regression: 1.0
log_every: 20
eval_every: 1
