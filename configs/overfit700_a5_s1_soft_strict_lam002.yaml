# A5/S1 P0-700: A3-G1 winner (gstar6) + soft_strict physical loss.
# Gate: valid/train strict_raw_top1_elementwise_rate >= 95%; SPD decode 100%
# (must not regress vs. plain gstar6 baseline -- this is the G2 lesson).
experiment_name: overfit700_a5_s1_soft_strict_lam002_seed42
seed: 42
device: cuda
output_dir: results/experiments
best_metric: strict_raw_top1_elementwise_rate
eval_ltol: 0.3
eval_atol_deg: 10.0
strict_ltol: 0.05
strict_atol_deg: 3.0
data:
  train_lmdb: /nanolab/users/wyx/alex_aflow_oqmd_mp/datasets/pxrd_241113_train.lmdb
  valid_lmdb: /nanolab/users/wyx/alex_aflow_oqmd_mp/datasets/pxrd_241113_train.lmdb
  train_jsonl: data/processed/overfit700_niggli_seed42.jsonl
  valid_jsonl: data/processed/overfit700_niggli_seed42.jsonl
  lattice_stats: data/processed/lattice_gstar6_stats_overfit700_niggli_seed42.json
  representation: gstar6
  batch_size: 700
  num_workers: 0
  train_augment: false
  valid_augment: false
  augment_shift_range: 0.0
model:
  encoder_checkpoint: null
  freeze_encoder: false
  normalize_embedding: false
  embedding_dim: 512
  hidden_dim: 512
  dropout: 0.0
  encoder_type: peak_transformer
  peak_transformer_max_peaks: 48
  peak_transformer_token_mode: geom
  peak_transformer_d_model: 256
  peak_transformer_num_layers: 4
  peak_transformer_num_heads: 8
  peak_transformer_ffn_dim: 1024
  peak_transformer_dropout: 0.0
  peak_transformer_fourier_freqs: 16
  peak_transformer_pool: cls_mean
  wavelength_angstrom: 1.54184
  intensity_transform: linear
  intensity_min: 5.0
  head_type: cs_conditional
  head_num_layers: 6
  multi_hypothesis: false
  num_hypotheses: 1
  use_cs_classifier: true
  cs_route: oracle
  train_cs_route: oracle
  cubic_bravais_split: false
  use_cubic_setting_classifier: false
  setting_route: oracle
  train_setting_route: oracle
optim:
  head_lr: 0.003
  encoder_lr: 0.003
  weight_decay: 0.0
  warmup_epochs: 5.0
  max_epochs: 1200
  min_epochs: 200
  grad_clip: 1.0
  early_stop_patience: null
  save_best_loss: true
loss:
  regression: 1.0
  mode: soft_strict
  physical_weight: 0.02
  soft_strict_tau: 0.5
  classification: 0.1
  setting_classification: 0.0
log_every: 20
eval_every: 5
eval_pymatgen_match: false
