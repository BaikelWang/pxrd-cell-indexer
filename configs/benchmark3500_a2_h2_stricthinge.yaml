# A2 wave-2 H2 @3500: T1 base + strict-hinge loss (penalize excess beyond ltol=0.05, atol=3deg).
# Targets the conjunction (worst-param) nature of strict. 100k reserved for winner lock-in only.
experiment_name: benchmark3500_a2_h2_stricthinge_seed42
seed: 42
device: cuda
output_dir: results/experiments
best_metric: strict_raw_top1_elementwise_rate
eval_ltol: 0.3
eval_atol_deg: 10.0
strict_ltol: 0.05
strict_atol_deg: 3.0
data:
  train_lmdb: /nanolab/users/wyx/alex_aflow_oqmd_mp/datasets/pxrd_241113_train.lmdb
  valid_lmdb: /nanolab/users/wyx/alex_aflow_oqmd_mp/datasets/pxrd_241113_train.lmdb
  train_jsonl: data/processed/benchmark_train3500_niggli_seed42.jsonl
  valid_jsonl: data/processed/benchmark_valid700_niggli_seed42.jsonl
  lattice_stats: data/processed/lattice_matrix6_stats_benchmark3500_niggli_seed42.json
  representation: matrix6
  batch_size: 256
  num_workers: 4
  train_augment: false
  valid_augment: false
  augment_shift_range: 0.0
model:
  encoder_checkpoint: null
  freeze_encoder: false
  normalize_embedding: false
  embedding_dim: 512
  hidden_dim: 512
  dropout: 0.1
  encoder_type: peak_transformer
  peak_transformer_max_peaks: 20
  peak_transformer_token_mode: pos
  peak_transformer_d_model: 256
  peak_transformer_num_layers: 4
  peak_transformer_num_heads: 8
  peak_transformer_ffn_dim: 1024
  peak_transformer_dropout: 0.1
  peak_transformer_fourier_freqs: 16
  peak_transformer_pool: cls_mean
  wavelength_angstrom: 1.54184
  intensity_transform: linear
  intensity_min: 5.0
  head_type: film
  head_num_layers: 4
  use_cs_classifier: true
  cs_route: predicted
  train_cs_route: oracle
  cubic_bravais_split: false
  use_cubic_setting_classifier: false
  setting_route: oracle
  train_setting_route: oracle
optim:
  head_lr: 0.001
  encoder_lr: 0.001
  weight_decay: 0.05
  warmup_epochs: 3.0
  max_epochs: 100
  min_epochs: 80
  grad_clip: 1.0
  early_stop_patience: null
  save_best_loss: true
loss:
  regression: 1.0
  mode: strict_hinge
  physical_weight: 0.3
  hinge_ltol: 0.05
  hinge_atol_deg: 3.0
  hinge_length_weight: 1.0
  hinge_angle_weight: 1.0
  classification: 0.1
  setting_classification: 0.0
log_every: 10
eval_every: 1
