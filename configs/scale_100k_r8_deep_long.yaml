# R8: capacity + long training (address underused 24GB VRAM + premature early-stop).
#
# Diagnosis:
#   - old champion ≈ 2.3M params; early-stop @ ep13–20 with patience 6–8
#   - histogram encoder Python for-loop starved the GPU (now vectorized)
#   - bag-of-features MLP activations are tiny; VRAM is mostly params+AdamW
#     → capacity jump is the real lever (not just bigger batch alone)
#
# This recipe (~235M params, ~4–5GB peak — ~100× old model):
#   - encoder residual MLP: hidden=2048, 12 blocks
#   - heads: hidden=1024, 4 layers
#   - batch 2048 + lr 0.001 (first attempt lr=0.005 blew up at ep4; deep net
#     needs milder LR than shallow champion sqrt-scaling)
#   - max_epochs 100, early_stop patience 25, warmup 5
# Gate vs R7 baseline (15.36% elem). If this plateaus without OOM room,
# next step is the ~700M / ~13GB variant (same schedule).
experiment_name: scale_100k_r8_deep_long_lr1e3_seed42
seed: 42
device: cuda
output_dir: results/experiments
best_metric: strict_raw_top1_elementwise_rate
eval_ltol: 0.3
eval_atol_deg: 10.0
strict_ltol: 0.05
strict_atol_deg: 3.0
data:
  train_lmdb: /nanolab/users/wyx/alex_aflow_oqmd_mp/datasets/pxrd_241113_train.lmdb
  valid_lmdb: /nanolab/users/wyx/alex_aflow_oqmd_mp/datasets/pxrd_241113_valid.lmdb
  train_jsonl: data/processed/train100k_seed42.jsonl
  valid_jsonl: data/processed/valid1400_seed42.jsonl
  lattice_stats: data/processed/lattice_matrix6_stats_100k_seed42.json
  representation: matrix6
  batch_size: 2048
  num_workers: 16
  train_augment: false
  valid_augment: false
  augment_shift_range: 0.0
model:
  encoder_checkpoint: null
  freeze_encoder: false
  normalize_embedding: false
  hidden_dim: 1024
  head_num_layers: 4
  dropout: 0.15
  encoder_type: histogram
  position_encoding: discrete
  peak_feature_mode: legacy
  wavelength_angstrom: 1.54184
  intensity_transform: linear
  hist_bins: 256
  sorted_peak_count: 24
  hist_pool: max
  histogram_hidden_dim: 2048
  histogram_num_blocks: 12
  histogram_dropout: 0.15
  intensity_min: 5.0
  head_type: cs_conditional
  use_cs_classifier: true
  cs_route: predicted
  train_cs_route: oracle
  cubic_bravais_split: true
  use_cubic_setting_classifier: true
  setting_route: classifier
  train_setting_route: oracle
optim:
  head_lr: 0.001
  encoder_lr: 0.001
  weight_decay: 0.05
  warmup_epochs: 5.0
  max_epochs: 100
  grad_clip: 1.0
  early_stop_patience: 25
loss:
  regression: 1.0
  mode: baseline
  classification: 0.1
  setting_classification: 0.2
log_every: 10
eval_every: 1
