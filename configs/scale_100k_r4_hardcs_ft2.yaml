experiment_name: scale_100k_r4_hardcs_ft2_seed42
seed: 42
device: cuda
output_dir: results/experiments
best_metric: strict_raw_top1_elementwise_rate
eval_ltol: 0.3
eval_atol_deg: 10.0
strict_ltol: 0.05
strict_atol_deg: 3.0
data:
  train_lmdb: /nanolab/users/wyx/alex_aflow_oqmd_mp/datasets/pxrd_241113_train.lmdb
  valid_lmdb: /nanolab/users/wyx/alex_aflow_oqmd_mp/datasets/pxrd_241113_valid.lmdb
  train_jsonl: data/processed/train100k_seed42.jsonl
  valid_jsonl: data/processed/valid1400_seed42.jsonl
  lattice_stats: data/processed/lattice_matrix6_stats_100k_seed42.json
  representation: matrix6
  batch_size: 64
  num_workers: 4
  train_augment: false
  valid_augment: false
  augment_shift_range: 0.0
  # Mild oversample of the four crystal systems currently near 0% (not the old
  # hex/trig set, which is already the best non-cubic performer for the champion).
  hard_cs_upsample: 1.5
  hard_cs_names: [tetragonal, orthorhombic, monoclinic, triclinic]
model:
  encoder_checkpoint: null
  freeze_encoder: false
  normalize_embedding: false
  hidden_dim: 256
  dropout: 0.1
  encoder_type: histogram
  position_encoding: discrete
  peak_feature_mode: legacy
  wavelength_angstrom: 1.54184
  intensity_transform: linear
  hist_bins: 256
  sorted_peak_count: 24
  hist_pool: max
  histogram_hidden_dim: 512
  histogram_dropout: 0.1
  intensity_min: 5.0
  head_type: cs_conditional
  use_cs_classifier: true
  cs_route: predicted
  train_cs_route: oracle
  cubic_bravais_split: true
  use_cubic_setting_classifier: true
  setting_route: classifier
  train_setting_route: oracle
  warm_start_checkpoint: results/experiments/scale_100k_r3_cubic_split_clf_seed42/checkpoints/best.pt
  # Freeze encoder + cubic CS head + cubic setting heads from epoch 1 (immediately);
  # only the 6 non-cubic lattice heads (+ classifiers, still trainable) update.
  hard_cs_finetune_epoch: 1
optim:
  head_lr: 0.0003
  encoder_lr: 0.0003
  weight_decay: 0.01
  warmup_epochs: 0.5
  max_epochs: 10
  grad_clip: 1.0
  early_stop_patience: 5
loss:
  regression: 1.0
  mode: baseline
  classification: 0.1
  setting_classification: 0.2
log_every: 50
eval_every: 1
